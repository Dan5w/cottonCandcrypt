<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cottonCandcrypt — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="login-card">
  <div class="logo-wrap">
    <div class="logo-icon"></div>
    <div class="logo-text">
      <h1>cottonCandcrypt</h1>
      <p>v1.0 &middot; Gestor de Backups SQL</p>
    </div>
  </div>

  <div class="error-msg" id="errorMsg">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="errorText">Credenciales inv&aacute;lidas</span>
  </div>

  <form id="loginForm" autocomplete="off">
    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" placeholder="Escribir usuario" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Contrase&ntilde;a</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="submitBtn">
      <span class="spinner"></span>
      <span class="btn-text">Iniciar Sesi&oacute;n</span>
    </button>
  </form>

  <div class="card-footer">
    <span>SHA-256 encrypted</span>
    <div class="enc-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Sesi&oacute;n segura
    </div>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');

function showError(msg) {
  errorText.textContent = msg;
  errorMsg.classList.add('show');
}

function hideError() {
  errorMsg.classList.remove('show');
}

function setLoading(on) {
  submitBtn.disabled = on;
  submitBtn.classList.toggle('loading', on);
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  setLoading(true);

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success) {
      window.location.href = '/';
    } else {
      showError(data.error || 'Credenciales inválidas');
    }
  } catch {
    showError('Error de conexión. Intenta nuevamente.');
  } finally {
    setLoading(false);
  }
});

document.getElementById('username').focus();
</script>
</body>
</html>
